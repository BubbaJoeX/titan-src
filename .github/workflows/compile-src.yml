name: SWG CI with Discord

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  compile-src:
    runs-on: ubuntu-latest
    container: cekisswg/swg-vm3.01-i386:latest

    steps:
      # 1. Checkout PR into the workspace
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Create symlink so /home/swg/swg-main points to the repo
      - name: Create /home/swg/swg-main symlink
        run: |
          mkdir -p /home/swg
          ln -s $GITHUB_WORKSPACE /home/swg/swg-main

      # 3. Install dependencies
      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y jq cmake make gcc g++ 

      # 4. Run ANT build
      - name: Run ANT Build
        id: build
        run: |
          set -e
          BUILD_LOG=/home/swg/swg-main/build.log
          cd /home/swg/swg-main
          ant build_src | tee $BUILD_LOG
          echo "BUILD_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # 5. Send Discord notification
      - name: Send Discord Notification
        if: always()
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          COMMIT_HASH="${{ github.event.pull_request.head.sha }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          STATUS="✅ Success"
          COLOR=3066993

          if [ "${BUILD_EXIT_CODE}" != "0" ]; then
            STATUS="❌ Failed"
            COLOR=15158332
          fi

          PAYLOAD=$(jq -n \
            --arg title "SWG CI Build $STATUS" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_url "$PR_URL" \
            --arg pr_author "$PR_AUTHOR" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_HASH" \
            --arg status "$STATUS" \
            --arg build_log "$(tail -n 10 /home/swg/swg-main/build.log | sed 's/"/\\"/g')" \
            --arg color "$COLOR" \
            '{
              "username": "SWG CI",
              "embeds": [{
                "title": $title,
                "color": ($color | tonumber),
                "fields": [
                  {"name": "PR", "value": "[" + $pr_title + "](" + $pr_url + ")", "inline": false},
                  {"name": "Author", "value": $pr_author, "inline": true},
                  {"name": "Branch", "value": $branch, "inline": true},
                  {"name": "Commit", "value": $commit, "inline": false},
                  {"name": "Status", "value": $status, "inline": true},
                  {"name": "Last 10 lines of Build Log", "value": $build_log, "inline": false}
                ],
                "footer": {"text": "SWG CI • GitHub Actions"}
              }]
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               https://discord.com/api/webhooks/1462352607015079956/r1jI0LpCUjyvXAbO43a2HUqW1XzZ9y-UdD_13VyyURZdwAghFV_vdZhrAP78CzU5D4RG
